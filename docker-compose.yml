x-internal-grpc: &internal-grpc
  USER_GRPC_URL: user-service:50051
  AUTH_GRPC_URL: auth-service:50052
  PRODUCT_GRPC_URL: product-service:50053
  SETTINGS_GRPC_URL: settings-service:50054
  BLOG_GRPC_URL: blog-service:50055
  ORDER_GRPC_URL: order-service:50056
  TAXONOMY_GRPC_URL: taxonomy-service:50057
  MEDIA_GRPC_URL: media-service:50058
services:
  # 🐘 PostgreSQL (shared across services)
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nebula
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/db/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
  
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
  
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_started
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done;
        mc mb -p local/media || true;
        exit 0;


  # 👤 User Service
  user-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: user-runtime
    container_name: user-service
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - apps/user-service/.env
    ports:
      - "3100:3100"
    environment:
      <<: *internal-grpc
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nebula_users?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?schema=nebula_users_shadow


  # 🔐 Auth Service
  auth-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: auth-runtime
    container_name: auth-service
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - .env
      - apps/auth-service/.env
    environment:
      <<: *internal-grpc
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      USER_GRPC_URL: user-service:50051
    ports:
      - "3001:3001"

  # 🛒 Product Service
  product-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/product-service/Dockerfile
    container_name: product-service
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      settings-service:
        condition: service_started
      taxonomy-service:
        condition: service_started
    env_file:
      - .env
      - apps/product-service/.env
    environment:
      <<: *internal-grpc
      AUTH_GRPC_URL: auth-service:50052
      SETTINGS_GRPC_URL: settings-service:50054
      TAXONOMY_GRPC_URL: taxonomy-service:50057
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nebula_products?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?schema=nebula_products_shadow
    ports:
      - "3003:3003"

  # ⚙️ Settings Service
  settings-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: settings-runtime
    container_name: settings-service
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      - apps/settings-service/.env
    ports:
      - "3010:3010"
    environment:
      <<: *internal-grpc
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nebula_settings?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?schema=nebula_settings_shadow

  
  taxonomy-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/taxonomy-service/Dockerfile
    container_name: taxonomy-service
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      settings-service:
        condition: service_started
    env_file:
      - .env
      - apps/taxonomy-service/.env
    environment:
      <<: *internal-grpc
      AUTH_GRPC_URL: auth-service:50052
      SETTINGS_GRPC_URL: settings-service:50054
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nebula_taxonomy?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?schema=nebula_taxonomy_shadow
    ports:
      - "3006:3006"

  blog-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/blog-service/Dockerfile
    container_name: blog-service
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      settings-service:
        condition: service_started
      taxonomy-service:
        condition: service_started
    env_file:
      - .env
      - apps/blog-service/.env
    environment:
      <<: *internal-grpc
      AUTH_GRPC_URL: auth-service:50052
      SETTINGS_GRPC_URL: settings-service:50054
      TAXONOMY_GRPC_URL: taxonomy-service:50057
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nebula_blog?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?schema=nebula_blog_shadow
    ports:
      - "3004:3004"

  order-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    container_name: order-service
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      settings-service:
        condition: service_started
      product-service:
        condition: service_started
    env_file:
      - .env
      - apps/order-service/.env
    environment:
      <<: *internal-grpc
      AUTH_GRPC_URL: auth-service:50052
      SETTINGS_GRPC_URL: settings-service:50054
      PRODUCT_GRPC_URL: product-service:50053
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nebula_order?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?schema=nebula_order_shadow
    ports:
      - "3005:3005"

  media-service:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: media-runtime
    container_name: media-service
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env
      - apps/media-service/.env
    environment:
      <<: *internal-grpc
      AUTH_GRPC_URL: auth-service:50052
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nebula_media?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?schema=nebula_media_shadow
      MEDIA_STORAGE_DRIVER: s3
      MEDIA_S3_ENDPOINT: http://minio:9000
      MEDIA_S3_REGION: us-east-1
      MEDIA_S3_BUCKET: media
      MEDIA_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MEDIA_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "3007:3007"

volumes:
  pgdata:
  minio-data:
